<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monsters Mathe-Markt</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        overflow: hidden;
        background: #222;
      }
    </style>
  </head>
  <body>
    <canvas id="game" style="display:block;margin:auto;"></canvas>
    <div id="debug" style="position:fixed;top:0;left:0;background:#222;color:#0f0;padding:10px;font-size:12px;z-index:9999;max-width:300px;overflow:auto;max-height:100vh;font-family:monospace;"></div>
    <script>
      function log(msg) {
        const el = document.getElementById('debug');
        el.innerHTML += msg + '<br>';
        console.log('[DEBUG]', msg);
      }
      log('Page loaded');
      log('BASE_URL: ' + window.location.href);
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
